name: Harness Housekeeping

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run housekeeping
        run: python scripts/harness_housekeeping.py --min-strict-pass-rate 0.60 --fail-on-warn
